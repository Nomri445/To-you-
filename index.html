<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Little Love Box 💌</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>💌 A Little Surprise For You</h1>

        <p>Click the box and discover something special ✨</p>

        <div class="love-box" onclick="openBox()">
            🎁
        </div>

        <div id="message" class="hidden">
            <h2>Welcome to my little garden 🌸</h2>
            <p>
                Every little flower here carries a small message for you.
            </p>

            <button onclick="showNote()">🌷 Open a flower</button>

            <p id="note"></p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
